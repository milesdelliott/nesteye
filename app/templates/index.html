<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Box Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 30px;
        }

        .video-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        #video-stream {
            width: 100%;
            height: auto;
            display: block;
        }

        .stream-status {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #c7d2ff;
            transform: translateY(-2px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .info-panel {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
        }

        .info-panel h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .info-panel p {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .error {
            background: #fee;
            border-left: 4px solid #f44;
            padding: 15px;
            border-radius: 4px;
            color: #c33;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bird Box Camera</h1>
            <p>Live Streaming Video Feed</p>
        </div>

        <div class="main-content">
            <div class="video-container">
                <img id="video-stream" src="/video_feed" alt="Bird Box Stream">
                <div class="stream-status">
                    <div class="status-indicator"></div>
                    <span id="status-text">LIVE</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="captureFrame()">Capture Photo</button>
                <button class="btn btn-secondary" onclick="refreshStatus()">Refresh Status</button>
                <button class="btn btn-secondary" onclick="toggleFullscreen()">Fullscreen</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="uptime">--:--:--</div>
                    <div class="stat-label">Uptime</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="timestamp">--:--</div>
                    <div class="stat-label">Last Update</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="camera-status">--</div>
                    <div class="stat-label">Camera Status</div>
                </div>
            </div>

            <div id="error-container"></div>

            <div class="info-panel">
                <h3>System Information</h3>
                <p><strong>Device:</strong> Raspberry Pi Zero W with Arducam 16MP</p>
                <p><strong>Resolution:</strong> 1920x1440 @ 30 FPS MJPEG</p>
                <p><strong>Autofocus:</strong> Continuous</p>
            </div>
        </div>
    </div>

    <script>
        function formatUptime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString();
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error('Status unavailable');
                const data = await response.json();
                document.getElementById('timestamp').textContent = formatTime(data.timestamp);
                document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);
                document.getElementById('camera-status').textContent = data.camera === 'connected' ? 'Online' : 'Offline';
                document.getElementById('status-text').textContent = data.status === 'online' ? 'LIVE' : 'OFFLINE';
                document.getElementById('error-container').innerHTML = '';
            } catch (error) {
                document.getElementById('error-container').innerHTML = '<div class="error">Failed to fetch status</div>';
            }
        }

        async function captureFrame() {
            try {
                const response = await fetch('/api/capture', { method: 'POST' });
                if (!response.ok) throw new Error('Capture failed');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nesteye-${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                document.getElementById('error-container').innerHTML = '<div class="error">Failed to capture photo</div>';
            }
        }

        function toggleFullscreen() {
            const stream = document.getElementById('video-stream');
            if (!document.fullscreenElement) {
                stream.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshStatus();
            setInterval(refreshStatus, 5000);
        });
    </script>
</body>
</html>
